<!-- Custom Sidenav Container -->
<div class="flex">
  <!-- Sidenav -->
  <div
    class="fixed top-0 left-0 h-full w-80 bg-white shadow-2xl transform transition-transform duration-300 z-20"
    [class.translate-x-0]="isSidenavOpen"
    [class.-translate-x-full]="!isSidenavOpen"
  >
    <div class="p-4 h-full bg-gray-50 overflow-y-auto">
      <!-- Header -->
      <div class="flex justify-between items-center mb-6 pb-3 border-b">
        <h3 class="text-xl font-bold text-gray-700">Categories</h3>
        <button
          class="text-gray-600 hover:text-gray-800 p-2 rounded hover:bg-gray-200 transition-colors"
          (click)="closeSidenav()"
        >
          <fa-icon [icon]="faTimes"></fa-icon>
        </button>
      </div>

      <!-- Categories Accordion -->
      <div class="space-y-2">
        @for (mainCategory of getCategories(); track mainCategory.id) {
        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
          <button
            class="w-full px-4 py-3 text-left flex justify-between items-center hover:bg-gray-50 transition-colors"
            (click)="toggleCategory(mainCategory.id)"
          >
            <span class="text-gray-700 font-medium">{{ mainCategory.category }}</span>
            <fa-icon
              [icon]="faAngleDown"
              class="transform transition-transform duration-200"
              [class.rotate-180]="isCategoryExpanded(mainCategory.id)"
            ></fa-icon>
          </button>
          
          @if (isCategoryExpanded(mainCategory.id)) {
          <div class="px-4 pb-4 border-t border-gray-100">
            @for (subCategory of getCategories(mainCategory.id); track subCategory.id) {
            <div class="py-2">
              <button
                class="w-full text-left px-3 py-2 text-gray-600 hover:bg-gray-100 rounded transition-colors"
                (click)="onSubCategoryClick(subCategory)"
              >
                {{ subCategory.category }}
              </button>
            </div>
            }
          </div>
          }
        </div>
        }
      </div>
    </div>
  </div>

  <!-- Main Content - Push Mode -->
  <div
    class="flex-1 flex flex-col transition-all duration-300 ease-in-out"
    [class.ml-80]="isSidenavOpen"
    [class.ml-0]="!isSidenavOpen"
  >
    <!-- Original Content -->
    <app-header (menuClicked)="toggleSidenav()"></app-header>
    <div class="pt-[100px] flex-1">
      <div class="h-full">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
