<div class="flex flex-wrap my-10 max-w-6xl mx-auto p-4">
  <div class="w-full md:w-5/12 text-center md:text-right">
    <div class="product-image-frame inline-block">
      <div
        class="product-image-color-layer"
        [style.background]="selectedColor()?.hex || 'transparent'"
        [style.opacity]="selectedColor()?.name === 'Black' ? 0.18 : (selectedColor() ? 0.5 : 0)"
      ></div>
      <img
        [src]="getMainImage()"
        class="h-[25em] rounded-xl inline-block object-contain product-main-image"
        [alt]="product()?.product_name || 'Product Image'"
        (error)="onImageError($event)"
      />
    </div>
  </div>

  <div class="w-full md:w-7/12 mt-6 md:mt-0 md:pl-12">
    <span class="text-[2.7em] font-bold mr-4">
      {{ product()?.product_name }}
    </span>

    <app-ratings [score]="product()?.ratings ?? 0"></app-ratings>

    <hr class="my-4" />

    <div class="mb-4">
      <div *ngIf="product()?.discount_pct" class="inline-block bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-sm mb-2 tracking-wide uppercase">
        Limited Time Deal
      </div>
      
      <div class="text-[1.3em] font-medium text-gray-600">
        Price:
        <span *ngIf="product()?.discount_pct" class="text-[1.6em] font-semibold text-red-600 ml-2">
          {{ product()?.offer_price | currency }}
        </span>
        <span [class.text-gray-400]="product()?.discount_pct" 
              [class.line-through]="product()?.discount_pct"
              [class.text-[1.6em]]="!product()?.discount_pct"
              [class.font-semibold]="!product()?.discount_pct"
              [class.text-black]="!product()?.discount_pct"
              class="ml-2">
          {{ product()?.price | currency }}
        </span>
        <div class="text-sm text-gray-500 mt-1">Inclusive of all taxes.</div>
      </div>
    </div>

    <div *ngIf="productMemoryOptions().length > 0" class="mb-6">
      <div class="mb-3">
        <span class="text-sm font-medium tracking-wide text-slate-600 uppercase">INTERNAL MEMORY</span>
      </div>
      <div class="memory-option-grid">
        <button
          *ngFor="let memory of productMemoryOptions()"
          type="button"
          class="memory-option-card cursor-pointer"
          [class.memory-option-card-active]="selectedMemory() === memory"
          (click)="selectMemory(memory)"
        >
          {{ memory }}
        </button>
      </div>
    </div>

    <div *ngIf="productColorOptions().length > 0" class="mb-6">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-medium tracking-wide text-slate-600 uppercase">COLOUR NAME</span>
        <button
          type="button"
          class="text-sm font-semibold text-blue-600 hover:text-blue-700 cursor-pointer"
          (click)="openColorDialog()"
        >
          VIEW ALL
        </button>
      </div>
      <div class="color-preview-grid">
        <button
          *ngFor="let color of productColorOptions()"
          type="button"
          class="color-preview-card cursor-pointer"
          [class.color-preview-card-active]="selectedColor()?.name === color.name"
          (click)="selectColor(color)"
        >
          <div class="color-preview-image-wrap">
            <div
              class="color-preview-tint"
              [style.background]="color.hex"
              [style.opacity]="color.name === 'Black' ? 0.18 : 0.5"
            ></div>
            <img
              [src]="getMainImage()"
              [alt]="(product()?.product_name || 'Product') + ' ' + color.name"
              class="color-preview-image"
              (error)="onImageError($event)"
            />
          </div>
          <span class="color-preview-label">{{ color.name }}</span>
        </button>
      </div>
    </div>

    <div class="product-description mb-6">
      <ng-container *ngIf="descriptionLines().length > 0; else emptyDescription">
        <div
          *ngFor="let line of descriptionLines()"
          [ngClass]="{
            'desc-section': line.type === 'section',
            'desc-bullet': line.type === 'bullet',
            'desc-text': line.type === 'text'
          }"
        >
          {{ line.text }}
        </div>
      </ng-container>
      <ng-template #emptyDescription>
        <div class="desc-text">No description available.</div>
      </ng-template>
    </div>

    <button
      class="flex items-center gap-3 bg-yellow-400 hover:bg-yellow-500 text-black font-semibold py-3 px-6 rounded-lg transition-colors duration-300 shadow cursor-pointer"
      (click)="addToCart()"
    >
      <fa-icon [icon]="faShoppingCart" class="text-lg"></fa-icon>
      <span class="text-lg">Add to Cart</span>
    </button>
  </div>
</div>

@if (isColorDialogOpen()) {
<div class="color-dialog-backdrop" (click)="closeColorDialog()">
  <div class="color-dialog-content" (click)="$event.stopPropagation()">
    <div class="color-dialog-header">
      <h2 class="color-dialog-title">CHOOSE COLOR</h2>
      <button type="button" class="color-dialog-close cursor-pointer" (click)="closeColorDialog()" aria-label="Close color dialog">
        &times;
      </button>
    </div>

    <div class="color-dialog-grid">
      <button
        *ngFor="let color of productColorOptions()"
        type="button"
        class="color-preview-card cursor-pointer"
        [class.color-preview-card-active]="selectedColor()?.name === color.name"
        (click)="selectColor(color); closeColorDialog()"
      >
        <div class="color-preview-image-wrap">
          <div
            class="color-preview-tint"
            [style.background]="color.hex"
            [style.opacity]="color.name === 'Black' ? 0.18 : 0.5"
          ></div>
          <img
            [src]="getMainImage()"
            [alt]="(product()?.product_name || 'Product') + ' ' + color.name"
            class="color-preview-image"
            (error)="onImageError($event)"
          />
        </div>
        <span class="color-preview-label">{{ color.name }}</span>
      </button>
    </div>
  </div>
</div>
}
