<div class="flex flex-wrap my-10 max-w-6xl mx-auto p-4">
  <div class="w-full md:w-5/12 text-center md:text-right">
    <img
      [src]="getMainImage()"
      class="h-[25em] rounded-xl inline-block object-contain"
      [alt]="product()?.product_name || 'Product Image'"
      (error)="onImageError($event)"
    />
  </div>

  <div class="w-full md:w-7/12 mt-6 md:mt-0 md:pl-12">
    <span class="text-[2.7em] font-bold mr-4">
      {{ product()?.product_name }}
    </span>

    <app-ratings [score]="product()?.ratings ?? 0"></app-ratings>

    <hr class="my-4" />

    <div class="mb-4">
      <div *ngIf="product()?.discount_pct" class="inline-block bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-sm mb-2 tracking-wide uppercase">
        Limited Time Deal
      </div>
      
      <div class="text-[1.3em] font-medium text-gray-600">
        Price:
        <span *ngIf="product()?.discount_pct" class="text-[1.6em] font-semibold text-red-600 ml-2">
          {{ product()?.offer_price | currency }}
        </span>
        <span [class.text-gray-400]="product()?.discount_pct" 
              [class.line-through]="product()?.discount_pct"
              [class.text-[1.6em]]="!product()?.discount_pct"
              [class.font-semibold]="!product()?.discount_pct"
              [class.text-black]="!product()?.discount_pct"
              class="ml-2">
          {{ product()?.price | currency }}
        </span>
        <div class="text-sm text-gray-500 mt-1">Inclusive of all taxes.</div>
      </div>
    </div>

    <div class="text-[1.5em] font-semibold text-gray-700 mb-6">
      {{ product()?.product_description }}
    </div>

    <button
      class="flex items-center gap-3 bg-yellow-400 hover:bg-yellow-500 text-black font-semibold py-3 px-6 rounded-lg transition-colors duration-300 shadow cursor-pointer"
      (click)="addToCart()"
    >
      <fa-icon [icon]="faShoppingCart" class="text-lg"></fa-icon>
      <span class="text-lg">Add to Cart</span>
    </button>
  </div>
</div>
